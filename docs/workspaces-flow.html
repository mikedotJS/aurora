<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aurora — Workspaces flow</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; }
  body { background: #0d0f12; color: #e6e6e6; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
  header { position: fixed; inset: 0 0 auto 0; padding: 9px 16px; background: #15181d; border-bottom: 1px solid #23272e; display: flex; align-items: center; gap: 10px; z-index: 10; font-size: 13px; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #3ddc84; box-shadow: 0 0 8px #3ddc84; transition: background .2s; }
  header .meta { color: #8a909a; margin-left: auto; font-variant-numeric: tabular-nums; }
  #wrap { padding: 56px 20px 48px; }
  #diagram { display: flex; justify-content: center; }
  #diagram svg { max-width: 100%; height: auto; }
  #err { white-space: pre-wrap; color: #ff7b72; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; padding: 12px 16px; margin: 0 auto; max-width: 900px; background: #1b1316; border: 1px solid #3a1f24; border-radius: 8px; display: none; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <strong>Aurora · Workspaces — user flow</strong>
    <span class="meta" id="meta">live</span>
  </header>
  <div id="wrap">
    <pre id="err"></pre>
    <div id="diagram"></div>
  </div>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose', flowchart: { curve: 'basis', htmlLabels: true, nodeSpacing: 45, rankSpacing: 55 } });
    const diagram = document.getElementById('diagram');
    const err = document.getElementById('err');
    const meta = document.getElementById('meta');
    const dot = document.getElementById('dot');
    const SRC = new URLSearchParams(location.search).get('src') || 'workspaces-flow.mmd';
    document.querySelector('header strong').textContent = 'Aurora · ' + SRC.replace(/\.mmd$/, '');
    let last = null, n = 0;
    const ok = (c) => { dot.style.background = c; dot.style.boxShadow = '0 0 8px ' + c; };
    async function tick() {
      try {
        const res = await fetch(SRC + '?_=' + Date.now(), { cache: 'no-store' });
        const text = await res.text();
        if (text === last) return;
        last = text;
        try {
          const { svg } = await mermaid.render('g' + (++n), text);
          diagram.innerHTML = svg;
          err.style.display = 'none';
          meta.textContent = 'maj ' + new Date().toLocaleTimeString();
          ok('#3ddc84');
        } catch (e) {
          err.textContent = 'Mermaid: ' + (e && e.message ? e.message : e);
          err.style.display = 'block';
          ok('#ff7b72');
        }
      } catch (e) { /* serveur momentanément indispo */ }
    }
    tick();
    setInterval(tick, 1200);
  </script>
</body>
</html>
